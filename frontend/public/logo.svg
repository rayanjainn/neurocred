<svg viewBox="0 0 428 428" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="214" cy="214" r="180" fill="#4A90E2" opacity="0.9"/>
  
  <!-- Light background accent -->
  <ellipse cx="180" cy="120" rx="140" ry="110" fill="#E8F1FF" opacity="0.3"/>
  
  <!-- Document/Chart background -->
  <rect x="160" y="50" width="180" height="200" rx="8" fill="#E8F1FF" opacity="0.9"/>
  
  <!-- Document lines (top) -->
  <line x1="170" y1="70" x2="280" y2="70" stroke="#B8D4FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="90" x2="240" y2="90" stroke="#B8D4FF" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Chart area with declining trend -->
  <rect x="160" y="120" width="170" height="110" rx="6" fill="#FFD5D5"/>
  
  <!-- Declining trend line -->
  <polyline points="175,155 205,140 235,170 265,150 285,185" 
            stroke="#E74C3C" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Down arrow on chart -->
  <g transform="translate(295, 175)">
    <polyline points="0,0 15,15 0,30" stroke="#E74C3C" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Chart placeholder text lines -->
  <line x1="305" y1="135" x2="325" y2="135" stroke="#FFB8B8" stroke-width="4" stroke-linecap="round"/>
  <line x1="305" y1="150" x2="325" y2="150" stroke="#FFB8B8" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Left document/sidebar -->
  <rect x="80" y="80" width="70" height="120" rx="6" fill="#9CA8B8" opacity="0.85"/>
  
  <!-- Sidebar text lines -->
  <line x1="92" y1="105" x2="138" y2="105" stroke="#6B7A8A" stroke-width="5" stroke-linecap="round"/>
  <line x1="92" y1="125" x2="138" y2="125" stroke="#6B7A8A" stroke-width="5" stroke-linecap="round"/>
  <line x1="92" y1="145" x2="128" y2="145" stroke="#6B7A8A" stroke-width="5" stroke-linecap="round"/>
  <line x1="92" y1="165" x2="128" y2="165" stroke="#6B7A8A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Calculator -->
  <rect x="95" y="220" width="95" height="110" rx="8" fill="#1F3A70"/>
  
  <!-- Calculator display -->
  <rect x="108" y="235" width="70" height="22" rx="4" fill="#7FD856"/>
  
  <!-- Calculator button grid -->
  <g fill="#5B8FD9" stroke="none">
    <!-- Row 1 -->
    <rect x="108" y="270" width="12" height="12" rx="2"/>
    <rect x="126" y="270" width="12" height="12" rx="2"/>
    <rect x="144" y="270" width="12" height="12" rx="2"/>
    <rect x="162" y="270" width="12" height="12" rx="2"/>
    
    <!-- Row 2 -->
    <rect x="108" y="288" width="12" height="12" rx="2"/>
    <rect x="126" y="288" width="12" height="12" rx="2"/>
    <rect x="144" y="288" width="12" height="12" rx="2"/>
    <rect x="162" y="288" width="12" height="12" rx="2"/>
    
    <!-- Row 3 -->
    <rect x="108" y="306" width="12" height="12" rx="2"/>
    <rect x="126" y="306" width="12" height="12" rx="2"/>
    <rect x="144" y="306" width="12" height="12" rx="2"/>
    <rect x="162" y="306" width="12" height="12" rx="2"/>
  </g>
  
  <!-- Orange accent button -->
  <rect x="108" y="324" width="66" height="12" rx="2" fill="#FFA500"/>
  
  <!-- Money bills (stacked) -->
  <g transform="translate(200, 280)">
    <!-- Bill 1 (back) -->
    <rect x="0" y="0" width="60" height="38" rx="3" fill="#A4D65E" opacity="0.7"/>
    <circle cx="15" cy="19" r="8" fill="#7FB834" opacity="0.6"/>
    <circle cx="45" cy="19" r="8" fill="#7FB834" opacity="0.6"/>
    
    <!-- Bill 2 (front) -->
    <g transform="translate(15, 18)">
      <rect x="0" y="0" width="60" height="38" rx="3" fill="#BFDB3E"/>
      <circle cx="15" cy="19" r="10" fill="#92C61E"/>
      <circle cx="45" cy="19" r="10" fill="#92C61E"/>
    </g>
  </g>
  
  <!-- Orange circle coin -->
  <circle cx="315" cy="290" r="28" fill="#FFA500" opacity="0.95"/>
  <circle cx="315" cy="290" r="22" fill="#FFB84D"/>
  
  <!-- Coin shine/highlight -->
  <circle cx="308" cy="280" r="6" fill="#FFD699" opacity="0.7"/>
  
  <!-- Bottom document text lines (for context) -->
  <line x1="175" y1="355" x2="265" y2="355" stroke="#B8D4FF" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="175" y1="370" x2="245" y2="370" stroke="#B8D4FF" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
</svg>